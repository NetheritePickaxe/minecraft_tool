name: Build

# 构建 Windows 与 Android 端，tag (v*) 推送或手动触发时运行；
# tag 触发会额外创建 GitHub Release 并附带产物。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build (Windows)
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Android 工具链：JDK 17 + SDK + NDK 27 (Tauri v2 推荐)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 首次构建需初始化 Android 工程（生成 src-tauri/gen/android）
      - name: Init Android project
        run: npm run tauri android init

      # 默认产出 release-variant APK（用 debug 签名，可直接安装测试）。
      # 如需正式签名发布到应用商店，配置下方 Secrets 后切换为 release 构建：
      #   1) 生成 keystore: keytool -genkey -v -keystore release.keystore -alias mctoolbox
      #   2) 仓库 Settings → Secrets 添加:
      #        ANDROID_KEYSTORE_BASE64 (base64 of .keystore)
      #        ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD / ANDROID_STORE_PASSWORD
      #   3) 在 gen/android/app/build.gradle.kts 配置 signingConfig 并改用 `npm run tauri android build -- --apk`
      - name: Build Android APK
        run: npm run tauri android build -- --apk --debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-artifacts/*
            artifacts/android-artifacts/**/*.apk
