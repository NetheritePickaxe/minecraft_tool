name: Lint

# 代码静态检查：前端 ESLint + Rust fmt/clippy
# - PR / push main：必须通过才能合并
# - 手动触发：支持随时运行检查
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 项目位于仓库根目录
defaults:
  run:
    working-directory: .

# 同一分支新 push 取消旧 lint
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ 前端 ESLint ============
  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

  # ============ Rust 格式检查 ============
  rust-fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check

  # ============ Rust Clippy 代码检查 ============
  rust-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Tauri 在 Linux 上编译依赖系统库（glib-sys、webkit2gtk 等），
      # clippy 需要实际编译才能检查，必须先安装。
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # -D warnings: warning 当作 error，保证代码质量
      # --all-targets: 检查所有目标（含 tests/benches）
      # 仅检查桌面端（默认 target），Android target 需 NDK，由 build job 覆盖
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
