name: Build

# 构建 Windows 与 Android 端。
# - tag (v*) 推送：构建 + 创建 Release（含 latest.json 更新清单）
# - PR / 手动：仅构建验证，不发布
on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要

# 项目位于仓库根目录
defaults:
  run:
    working-directory: .

# 同一分支新 push 取消旧构建，避免浪费
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 注入 updater 签名私钥（来自 GitHub Secrets），
      # Tauri bundler 会自动对 NSIS exe 与 MSI 生成 .sig 签名文件。
      # 私钥本身不会进入产物，仅用于签名。
      - name: Build (Windows)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # 私钥未设密码，留空即可
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # Tauri bundler 硬编码 MSI 文件名为 {name}_{version}_{arch}_{lang}.msi，
      # 无法通过配置去掉语言后缀。构建后重命名为 {name}_{version}_{arch}.msi。
      # exe (NSIS) 本身不带语言后缀，无需处理。
      # 同步重命名 .sig 签名文件，保持与 .msi 文件名一致。
      - name: Strip language suffix from MSI
        shell: bash
        run: |
          set -e
          msi_dir="src-tauri/target/release/bundle/msi"
          shopt -s nullglob
          for f in "$msi_dir"/*_x64_??-??.msi; do
            base="${f%_x64_??-??.msi}"
            new="${base}_x64.msi"
            if [ -e "$new" ]; then
              echo "ERROR: target file already exists: $new" >&2
              exit 1
            fi
            mv "$f" "$new"
            echo "renamed: $(basename "$f") -> $(basename "$new")"
            # 同步重命名 .sig
            if [ -f "${f}.sig" ]; then
              mv "${f}.sig" "${new}.sig"
              echo "renamed: $(basename "$f").sig -> $(basename "$new").sig"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Android 工具链：JDK 17 + SDK + NDK 27 (Tauri v2 推荐)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          # 裁掉 i686(对应 x86/32位，极少见)；保留 arm64-v8a/armeabi-v7a(真机) + x86_64(模拟器)
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 首次构建需初始化 Android 工程（生成 src-tauri/gen/android）
      - name: Init Android project
        run: npm run tauri android init

      # Tauri 生成的 gradle 模板中 release buildType 缺少 signingConfig，
      # 直接 release 构建会产出无法安装的未签名 APK。
      # 这里让 release 复用 debug 签名（CI 测试构建可直接安装）。
      # 正式发布到 Play Store 需替换为真实 keystore，见 README。
      - name: Patch Gradle release signing
        run: |
          python3 - <<'PY'
          p = "src-tauri/gen/android/app/build.gradle.kts"
          s = open(p).read()
          if 'signingConfig = signingConfigs.getByName("debug")' not in s:
              s = s.replace(
                  'getByName("release") {',
                  'getByName("release") {\n            signingConfig = signingConfigs.getByName("debug")',
                  1,
              )
              open(p, "w").write(s)
              print("patched release signingConfig -> debug")
          else:
              print("already patched")
          PY

      # release 构建 + 按 ABI 拆分。
      # release 剥离调试符号(Cargo profile.release.strip=true)，
      # 每个 ABI 的 .so 从 ~100MB(debug) 降到 ~10-20MB(release)；
      # --split-per-abi 为每个 ABI 产出独立 APK，避免 universal 单包过大。
      # --target 使用 Tauri 简写: aarch64→arm64-v8a, armv7→armeabi-v7a, x86_64→x86_64
      - name: Build Android APK (release, split per ABI)
        run: npm run tauri android build -- --apk --split-per-abi --target aarch64 --target armv7 --target x86_64

      # Gradle --split-per-abi 默认输出简写文件名(app-arm64-release.apk 等)，
      # 不符合 Android ABI 命名规范。重命名为 <product>-<version>-<abi>.apk：
      #   arm64  → arm64-v8a
      #   arm    → armeabi-v7a
      #   x86_64 → x86_64
      # APK 实际路径在 <abi_short>/release/app-<abi_short>-release.apk
      - name: Rename APK to standard ABI naming
        run: |
          set -e
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PRODUCT="mc-toolbox"
          OUT="src-tauri/gen/android/app/build/outputs/apk"
          declare -A ABI_MAP=( ["arm64"]="arm64-v8a" ["arm"]="armeabi-v7a" ["x86_64"]="x86_64" ["x86"]="x86" )
          for abi_short in "${!ABI_MAP[@]}"; do
            abi_full="${ABI_MAP[$abi_short]}"
            src="$OUT/${abi_short}/release/app-${abi_short}-release.apk"
            if [ -f "$src" ]; then
              dst="$OUT/${PRODUCT}-${VERSION}-${abi_full}.apk"
              mv "$src" "$dst"
              echo "renamed: $abi_short -> $abi_full"
              echo "  $dst"
            fi
          done
          echo "=== final APK list ==="
          ls -lh "$OUT"/*.apk

      - name: Show APK sizes
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: src-tauri/gen/android/app/build/outputs/apk/*.apk
          if-no-files-found: error

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 仅 tag 触发时发布，PR/手动触发只做构建验证
    if: startsWith(github.ref, 'refs/tags/')
    # release job 需要访问仓库根的 artifacts/ 和 src-tauri/tauri.conf.json，
    # 覆盖 workflow 级 defaults 的 working-directory
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 生成 latest.json 更新清单：
      # - version: 从 tauri.conf.json 读取
      # - platforms.windows-x86_64: NSIS exe 的下载 URL + .sig 签名内容
      # - android: 各 ABI 的 APK 下载 URL
      # tauri-plugin-updater (Windows) 与前端 Android 自建流程都从这个文件读取更新信息。
      - name: Generate latest.json
        run: |
          python3 - <<'PY'
          import json, os, glob
          from datetime import datetime, timezone
          from urllib.parse import quote

          with open("src-tauri/tauri.conf.json") as f:
              conf = json.load(f)
          version = conf["version"]
          tag = f"v{version}"
          base = f"https://github.com/NetheritePickaxe/minecraft_tool/releases/download/{tag}"
          pub_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          # Windows NSIS exe + sig (updater 仅用 NSIS exe，不用 MSI)
          exe_sig = ""
          exe_url = ""
          sig_files = glob.glob("artifacts/windows-artifacts/**/*.exe.sig", recursive=True)
          if sig_files:
              with open(sig_files[0]) as f:
                  exe_sig = f.read().strip()
              exe_name = os.path.basename(sig_files[0]).replace(".sig", "")
              exe_url = f"{base}/{quote(exe_name)}"
          else:
              raise SystemExit("ERROR: no .exe.sig found; was TAURI_SIGNING_PRIVATE_KEY set?")

          # Android APKs: mc-toolbox-<version>-<abi>.apk
          android = {}
          for apk in sorted(glob.glob("artifacts/android-artifacts/*.apk")):
              name = os.path.basename(apk)
              # rsplit('-', 2) => ['mc-toolbox', '<version>', '<abi>.apk']
              parts = name.rsplit('-', 2)
              if len(parts) == 3:
                  abi = parts[2].replace('.apk', '')
                  android[abi] = f"{base}/{quote(name)}"

          manifest = {
              "version": version,
              "notes": "",
              "pub_date": pub_date,
              "platforms": {
                  "windows-x86_64": {
                      "signature": exe_sig,
                      "url": exe_url,
                  }
              },
              "android": android,
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print("=== latest.json ===")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-artifacts/**/*.exe
            artifacts/windows-artifacts/**/*.exe.sig
            artifacts/windows-artifacts/**/*.msi
            artifacts/windows-artifacts/**/*.msi.sig
            artifacts/android-artifacts/*.apk
            latest.json
