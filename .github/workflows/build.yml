name: Build

# 构建 Windows 与 Android 端。
# - tag (v*) 推送：构建 + 创建 Release
# - PR / 手动：仅构建验证，不发布
on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要

# 项目位于 mc-toolbox 子目录，所有 run 步骤默认在此执行
defaults:
  run:
    working-directory: mc-toolbox

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mc-toolbox/package-lock.json

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mc-toolbox/src-tauri

      - name: Build (Windows)
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            mc-toolbox/src-tauri/target/release/bundle/nsis/*.exe
            mc-toolbox/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mc-toolbox/package-lock.json

      - run: npm ci

      # Android 工具链：JDK 17 + SDK + NDK 27 (Tauri v2 推荐)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          # 裁掉 i686(32位x86，极少见)；保留 aarch64/armv7(真机) + x86_64(模拟器)
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mc-toolbox/src-tauri

      # 首次构建需初始化 Android 工程（生成 src-tauri/gen/android）
      - name: Init Android project
        run: npm run tauri android init

      # Tauri 生成的 gradle 模板中 release buildType 缺少 signingConfig，
      # 直接 release 构建会产出无法安装的未签名 APK。
      # 这里让 release 复用 debug 签名（CI 测试构建可直接安装）。
      # 正式发布到 Play Store 需替换为真实 keystore，见 README。
      - name: Patch Gradle release signing
        run: |
          python3 - <<'PY'
          p = "src-tauri/gen/android/app/build.gradle.kts"
          s = open(p).read()
          if 'signingConfig = signingConfigs.getByName("debug")' not in s:
              s = s.replace(
                  'getByName("release") {',
                  'getByName("release") {\n            signingConfig = signingConfigs.getByName("debug")',
                  1,
              )
              open(p, "w").write(s)
              print("patched release signingConfig -> debug")
          else:
              print("already patched")
          PY

      # release 构建 + 按 ABI 拆分。
      # release 剥离调试符号(Cargo profile.release.strip=true)，
      # 每个 ABI 的 .so 从 ~100MB(debug) 降到 ~10-20MB(release)；
      # --split-per-abi 为每个 ABI 产出独立 APK，避免 universal 单包过大。
      - name: Build Android APK (release, split per ABI)
        run: npm run tauri android build -- --apk --split-per-abi

      - name: Show APK sizes
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: mc-toolbox/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    # 仅 tag 触发时发布，PR/手动触发只做构建验证
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-artifacts/*
            artifacts/android-artifacts/**/*.apk
